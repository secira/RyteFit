<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9ACD32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E8B57;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Large T with gradient -->
  <text x="50" y="200" font-family="Arial, sans-serif" font-size="180" font-weight="bold" fill="url(#greenGradient)">T</text>
  
  <!-- Thumbs up outline -->
  <g transform="translate(200, 80)">
    <path d="M 20 80 L 20 40 Q 20 20 40 20 L 60 20 L 60 10 Q 60 0 70 0 Q 80 0 80 10 L 80 40 L 80 80 M 20 80 L 0 80 L 0 120 L 20 120 M 20 80 L 80 80 L 80 120 Q 80 130 70 130 L 30 130 Q 20 130 20 120 Z" 
          fill="none" 
          stroke="#000000" 
          stroke-width="4" 
          stroke-linejoin="round"/>
    <path d="M 20 80 L 20 40 Q 20 20 40 20 L 60 20 L 60 10 Q 60 0 70 0 Q 80 0 80 10 L 80 40 L 80 80 M 20 80 L 0 80 L 0 120 L 20 120 M 20 80 L 80 80 L 80 120 Q 80 130 70 130 L 30 130 Q 20 130 20 120 Z" 
          fill="#FFFFFF"/>
  </g>
  
  <!-- TOP NOW text -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="48" font-weight="normal" text-anchor="middle" fill="#000000" letter-spacing="2">TOP NOW</text>
</svg>
